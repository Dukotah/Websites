name: Deploy Winery Preview

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'sites/**'

jobs:
  # ── Detect which site folders changed ──────────────────────────────────────
  detect-sites:
    name: Detect changed sites
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-sites: ${{ steps.set-matrix.outputs.has-sites }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed site folders
        id: set-matrix
        run: |
          # Get all files changed in this push
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null \
            || git diff --name-only HEAD~1 HEAD)

          echo "Changed files:"
          echo "$CHANGED"

          # Extract unique site slugs, excluding template directories
          SITES=$(echo "$CHANGED" \
            | grep '^sites/' \
            | sed 's|^sites/\([^/]*\)/.*|\1|' \
            | grep -v '^_' \
            | sort -u \
            | jq -Rc . \
            | jq -sc .)

          echo "Detected sites: $SITES"

          if [ "$SITES" = "[]" ] || [ -z "$SITES" ]; then
            echo "matrix={\"site\":[]}" >> "$GITHUB_OUTPUT"
            echo "has-sites=false" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"site\":$SITES}" >> "$GITHUB_OUTPUT"
            echo "has-sites=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Deploy each changed site to Vercel ─────────────────────────────────────
  deploy:
    name: Deploy ${{ matrix.site }}
    needs: detect-sites
    if: needs.detect-sites.outputs.has-sites == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-sites.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sites/${{ matrix.site }}/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install site dependencies
        working-directory: sites/${{ matrix.site }}
        run: npm ci

      - name: Deploy to Vercel (preview)
        id: deploy
        working-directory: sites/${{ matrix.site }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --yes --token "$VERCEL_TOKEN" 2>&1 | tail -1)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $DEPLOY_URL"

      - name: Write deployment summary
        env:
          SITE: ${{ matrix.site }}
          URL: ${{ steps.deploy.outputs.url }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## 🍷 Winery Preview Deployed

          | Field | Value |
          |-------|-------|
          | **Site** | \`$SITE\` |
          | **Preview URL** | [$URL]($URL) |
          | **Branch** | \`$BRANCH\` |
          | **Commit** | \`${COMMIT:0:7}\` |

          **Next step:** Copy the preview URL above and send it to the winery owner as a sales demo link.

          SUMMARY

  # ── Summary job — runs after all deploys finish ─────────────────────────────
  summary:
    name: Deployment summary
    needs: [detect-sites, deploy]
    if: always() && needs.detect-sites.outputs.has-sites == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Write combined summary
        run: |
          echo "## All Winery Preview URLs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check each deploy job above for individual preview URLs." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Tip:** Send the preview URL to the winery owner so they can see their demo site before committing to the project." >> "$GITHUB_STEP_SUMMARY"
