<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8a080"/>
      <stop offset="100%" stop-color="#d4b896"/>
    </linearGradient>
    <linearGradient id="hills" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b8a4e"/>
      <stop offset="100%" stop-color="#4a6632"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="1200" height="600" fill="url(#sky)"/>
  <!-- Far hills -->
  <ellipse cx="200" cy="420" rx="320" ry="140" fill="#8aad6a" opacity=".7"/>
  <ellipse cx="700" cy="380" rx="500" ry="160" fill="#7a9e5c" opacity=".8"/>
  <ellipse cx="1100" cy="430" rx="280" ry="120" fill="#6b9050" opacity=".7"/>
  <!-- Ground -->
  <rect y="460" width="1200" height="140" fill="#5a7838"/>
  <!-- Vine rows -->
  <g opacity=".85">
    <line x1="100" y1="500" x2="1100" y2="490" stroke="#3d5a22" stroke-width="3"/>
    <line x1="100" y1="525" x2="1100" y2="515" stroke="#3d5a22" stroke-width="3"/>
    <line x1="100" y1="550" x2="1100" y2="540" stroke="#3d5a22" stroke-width="3"/>
  </g>
  <!-- Vine posts -->
  <g fill="#5c3a1e" opacity=".7">
    <rect x="148" y="478" width="4" height="60"/>
    <rect x="248" y="480" width="4" height="58"/>
    <rect x="348" y="482" width="4" height="56"/>
    <rect x="448" y="480" width="4" height="58"/>
    <rect x="548" y="478" width="4" height="60"/>
    <rect x="648" y="480" width="4" height="58"/>
    <rect x="748" y="482" width="4" height="56"/>
    <rect x="848" y="480" width="4" height="58"/>
    <rect x="948" y="478" width="4" height="60"/>
    <rect x="1048" y="480" width="4" height="58"/>
  </g>
  <!-- Sun glow -->
  <ellipse cx="900" cy="160" rx="80" ry="80" fill="#f0c060" opacity=".25"/>
  <ellipse cx="900" cy="160" rx="50" ry="50" fill="#f5d080" opacity=".3"/>
</svg>
